<div id="project-stats"
     hx-get="{% url 'project_stats' project.pk %}"
     hx-trigger="statsChanged from:body"
     hx-swap="outerHTML"
     class="grid grid-cols-3 gap-px bg-[#1e2028] rounded-xl overflow-hidden border border-[#1e2028]">

  <!-- Progreso -->
  <div class="bg-[#12141a] px-5 py-4">
    <p class="text-xs font-semibold text-gray-600 uppercase tracking-widest mb-2">Progreso</p>
    <p class="text-2xl font-bold text-white mb-2">{{ progress_pct }}%</p>
    <div class="w-full bg-[#1e2028] rounded-full h-1.5">
      <div class="bg-orange-500 h-1.5 rounded-full transition-all" style="width: {{ progress_pct }}%"></div>
    </div>
  </div>

  <!-- Tareas -->
  <div class="bg-[#12141a] px-5 py-4">
    <p class="text-xs font-semibold text-gray-600 uppercase tracking-widest mb-2">Tareas</p>
    <p class="text-2xl font-bold text-white">
      {{ completed_count }} <span class="text-gray-600 text-lg font-normal">/ {{ active_count }}</span>
    </p>
    <p class="text-xs text-gray-700 mt-1">completadas</p>
  </div>

  <!-- Tiempo estimado -->
  <div class="bg-[#12141a] px-5 py-4">
    <p class="text-xs font-semibold text-gray-600 uppercase tracking-widest mb-2">Tiempo Est.</p>
    <p class="text-2xl font-bold text-white">
      {{ total_hours }}<span class="text-gray-600 text-sm font-normal ml-1">h</span>
    </p>
  </div>

</div>
