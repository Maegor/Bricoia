{% if messages %}
  <div class="max-w-6xl mx-auto px-4 mt-3 space-y-2">
    {% for message in messages %}
      <div class="flex items-start rounded-lg px-4 py-3 text-xs font-medium uppercase tracking-wide border
        {% if message.tags == 'error' %}bg-red-900/30 text-red-400 border-red-800
        {% elif message.tags == 'success' %}bg-green-900/30 text-green-400 border-green-800
        {% elif message.tags == 'warning' %}bg-yellow-900/30 text-yellow-400 border-yellow-800
        {% else %}bg-orange-900/30 text-orange-400 border-orange-800{% endif %}">
        <span>{{ message }}</span>
      </div>
    {% endfor %}
  </div>
{% endif %}
