{% extends "base.html" %}
{% block title %}Registro — Bricoia{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-sm p-8 mt-8">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">Crear cuenta</h1>

  <form method="post" novalidate>
    {% csrf_token %}

    {% for field in form %}
      <div class="mb-4">
        <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
          {{ field.label }}{% if field.field.required %} <span class="text-red-500">*</span>{% endif %}
        </label>
        <input
          type="{{ field.field.widget.input_type }}"
          name="{{ field.html_name }}"
          id="{{ field.id_for_label }}"
          {% if field.value %}value="{{ field.value }}"{% endif %}
          class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500
            {% if field.errors %}border-red-400{% else %}border-gray-300{% endif %}">
        {% for error in field.errors %}
          <p class="text-red-500 text-xs mt-1">{{ error }}</p>
        {% endfor %}
      </div>
    {% endfor %}

    <button type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg text-sm transition-colors">
      Registrarse
    </button>
  </form>

  <p class="text-center text-sm text-gray-500 mt-4">
    ¿Ya tienes cuenta?
    <a href="{% url 'login' %}" class="text-indigo-600 hover:underline">Inicia sesión</a>
  </p>
</div>
{% endblock %}
