<div id="tool-{{ tool.pk }}"
     class="relative bg-[#1c1f26] border border-[#262a33] hover:bg-[#242832] hover:border-[#363b45] rounded-lg p-2.5 cursor-pointer transition-colors flex flex-col min-h-[60px]"
     hx-on:click="const p=this.querySelector('.tool-actions'),wasHidden=p.classList.contains('hidden');document.querySelectorAll('.step-actions,.tool-actions').forEach(el=>el.classList.add('hidden'));if(wasHidden)p.classList.remove('hidden')">
  <button type="button"
          class="absolute top-2 right-2 w-5 h-5 rounded flex items-center justify-center transition-colors {% if tool.available %}bg-green-500 border-green-500{% else %}bg-transparent border border-[#4a5060] hover:border-gray-400{% endif %}"
          hx-post="{% url 'tool_toggle_available' tool.pk %}"
          hx-target="#tool-{{ tool.pk }}"
          hx-swap="outerHTML"
          hx-on:click="event.stopPropagation()">
    {% if tool.available %}
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-white" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
      </svg>
    {% endif %}
  </button>
  <span class="text-[12px] font-medium text-gray-300 leading-snug flex-1 pr-7">{{ tool.name }}</span>
  <div class="tool-actions hidden flex gap-2 mt-2 pt-1.5 border-t border-[#262a33]">
    <button class="font-jetbrains text-[10px] text-[#ff7a3d] hover:text-orange-400 transition-colors uppercase tracking-widest"
            hx-get="{% url 'tool_edit_form' tool.pk %}"
            hx-target="#tool-{{ tool.pk }}"
            hx-swap="outerHTML"
            hx-on:click="event.stopPropagation()">Editar</button>
    <button class="font-jetbrains text-[10px] text-red-700 hover:text-red-500 transition-colors uppercase tracking-widest"
            hx-post="{% url 'tool_delete' tool.pk %}"
            hx-target="#tool-{{ tool.pk }}"
            hx-swap="outerHTML"
            hx-on:click="event.stopPropagation()">Borrar</button>
  </div>
</div>
