<div id="step-{{ step.pk }}" class="px-4 py-3.5 border-b border-[#262a33]">
  <form hx-post="{% url 'step_update' step.pk %}"
        hx-target="#step-{{ step.pk }}"
        hx-swap="outerHTML">
    <input type="text" name="title" value="{{ step.title }}"
           placeholder="Título" required
           class="w-full bg-[#1c1f26] border border-[#262a33] rounded-lg px-3 py-1.5 text-sm text-white placeholder-gray-700 mb-2 focus:outline-none focus:border-[#ff7a3d]/50">
    <textarea name="description" rows="2"
              placeholder="Descripción" required
              class="w-full bg-[#1c1f26] border border-[#262a33] rounded-lg px-3 py-1.5 text-sm text-gray-400 placeholder-gray-700 mb-3 focus:outline-none focus:border-[#ff7a3d]/50 resize-none">{{ step.description }}</textarea>
    <div class="flex gap-2">
      <button type="submit"
              class="font-jetbrains text-[11px] border border-[#ff7a3d]/40 text-[#ff7a3d] hover:bg-[#ff7a3d]/10 px-3 py-1.5 rounded-lg transition-colors uppercase tracking-widest">
        Guardar
      </button>
      <button type="button"
              class="font-jetbrains text-[11px] border border-[#262a33] text-gray-500 hover:text-gray-300 px-3 py-1.5 rounded-lg transition-colors uppercase tracking-widest"
              hx-get="{% url 'step_view' step.pk %}"
              hx-target="#step-{{ step.pk }}"
              hx-swap="outerHTML">
        Cancelar
      </button>
    </div>
  </form>
</div>
