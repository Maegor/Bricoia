{% if comment %}
<div class="flex items-start gap-4 py-4">
  <div class="flex-shrink-0 w-8 h-8 rounded-full bg-orange-900 border border-orange-500/30 flex items-center justify-center">
    <span class="text-xs font-bold text-orange-400 uppercase">{{ comment.author.username|slice:":2" }}</span>
  </div>
  <div class="flex-1 min-w-0">
    <div class="flex items-baseline gap-2 mb-1">
      <span class="text-xs font-semibold text-gray-300 uppercase tracking-wide">{{ comment.author.username }}</span>
      <span class="text-xs text-gray-700">{{ comment.created_at|date:"d/m/Y H:i" }}</span>
    </div>
    <p class="text-sm text-gray-400 leading-relaxed whitespace-pre-wrap">{{ comment.body }}</p>
  </div>
</div>
{% endif %}
