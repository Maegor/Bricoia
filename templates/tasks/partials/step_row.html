<div class="step-row mb-3">
  <div class="flex items-start gap-2">
    <span class="text-xs text-gray-700 w-5 text-right flex-shrink-0 mt-2.5">{{ index|add:1 }}.</span>
    <div class="flex-1 space-y-1.5">
      <input type="text"
             name="steps-{{ index }}-title"
             class="w-full bg-[#2e2e2e] border border-[#444] text-white font-semibold rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500"
             placeholder="Título del paso">
      <input type="text"
             name="steps-{{ index }}-description"
             class="w-full bg-[#2e2e2e] border border-[#444] text-gray-400 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500"
             placeholder="Descripción detallada">
    </div>
    <button type="button"
            class="text-gray-600 hover:text-red-400 flex-shrink-0 text-lg leading-none transition-colors mt-2"
            hx-on:click="this.closest('.step-row').remove()">
      &times;
    </button>
  </div>
</div>
