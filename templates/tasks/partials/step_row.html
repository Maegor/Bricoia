<div class="step-row flex items-center gap-2 mb-2">
  <span class="text-xs text-gray-400 w-5 text-right flex-shrink-0">{{ index|add:1 }}.</span>
  <input type="text"
         name="steps-{{ index }}-description"
         class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
         placeholder="Descripción del paso">
  <button type="button"
          class="text-gray-400 hover:text-red-500 flex-shrink-0 text-lg leading-none"
          hx-on:click="this.closest('.step-row').remove()">
    &times;
  </button>
</div>
