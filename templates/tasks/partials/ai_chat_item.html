{% if ai_error %}
<div class="py-3 border-b border-[#1c1f26] last:border-0">
  <p class="font-jetbrains text-[11px] text-red-500">{{ ai_error }}</p>
</div>
{% elif ai_chat %}
<details class="py-3 border-b border-[#1c1f26] last:border-0 group">
  <summary class="list-none flex items-center gap-3 cursor-pointer select-none">
    <span class="flex-shrink-0 w-5 h-5 rounded-full bg-[#ff7a3d]/10 border border-[#ff7a3d]/30 flex items-center justify-center">
      <span class="text-[9px] text-[#ff7a3d]">✦</span>
    </span>
    <span class="font-jetbrains text-[11px] text-gray-400 truncate flex-1">{{ ai_chat.prompt }}</span>
    <span class="font-jetbrains text-[10px] text-gray-700 flex-shrink-0">{{ ai_chat.created_at|date:"d/m/Y H:i" }}</span>
    <span class="font-jetbrains text-[10px] text-gray-600 flex-shrink-0 transition-transform group-open:rotate-90">▶</span>
  </summary>
  <div class="mt-3 ml-8 space-y-3">
    <div>
      <p class="font-jetbrains text-[10px] text-gray-600 uppercase tracking-widest mb-1">Pregunta</p>
      <p class="text-sm text-gray-300 leading-relaxed">{{ ai_chat.prompt }}</p>
    </div>
    <div>
      <p class="font-jetbrains text-[10px] text-[#ff7a3d] uppercase tracking-widest mb-1">Respuesta</p>
      <p class="text-sm text-gray-400 leading-relaxed whitespace-pre-wrap">{{ ai_chat.response }}</p>
    </div>
  </div>
</details>
{% endif %}
