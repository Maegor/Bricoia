<div id="step-{{ step.pk }}"
     class="flex items-start gap-3 px-4 py-3.5 cursor-pointer select-none border-b border-[#262a33] last:border-0"
     hx-on:click="const p=this.querySelector('.step-actions'),wasHidden=p.classList.contains('hidden');document.querySelectorAll('.step-actions,.tool-actions').forEach(el=>el.classList.add('hidden'));if(wasHidden)p.classList.remove('hidden')">
  <div class="flex-shrink-0 w-[22px] h-[22px] rounded-full border border-[#ff7a3d]/60 flex items-center justify-center mt-0.5">
    <span class="font-jetbrains text-[11px] text-[#ff7a3d] leading-none">{{ step.order }}</span>
  </div>
  <div class="flex-1 min-w-0">
    {% if step.title %}
      <p class="text-[13px] font-medium text-white leading-snug">{{ step.title }}</p>
    {% endif %}
    {% if step.description %}
      <p class="text-[12px] text-gray-500 leading-relaxed mt-0.5">{{ step.description }}</p>
    {% endif %}
    <div class="step-actions hidden flex gap-3 mt-2">
      <button class="font-jetbrains text-[11px] text-[#ff7a3d] hover:text-orange-400 transition-colors uppercase tracking-widest"
              hx-get="{% url 'step_edit_form' step.pk %}"
              hx-target="#step-{{ step.pk }}"
              hx-swap="outerHTML"
              hx-on:click="event.stopPropagation()">Editar</button>
      <button class="font-jetbrains text-[11px] text-red-700 hover:text-red-500 transition-colors uppercase tracking-widest"
              hx-post="{% url 'step_delete' step.pk %}"
              hx-target="#steps-list"
              hx-swap="innerHTML"
              hx-on:click="event.stopPropagation()">Borrar</button>
    </div>
  </div>
</div>
