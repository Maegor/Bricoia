<div id="link-{{ link.pk }}" class="flex items-start justify-between gap-3 py-2.5 border-b border-[#1c1f26] last:border-0">
  <div class="min-w-0">
    <p class="font-jetbrains text-[11px] text-gray-300 truncate">{{ link.description }}</p>
    <a href="{{ link.url }}" target="_blank" rel="noopener noreferrer"
       class="font-jetbrains text-[10px] text-[#ff7a3d]/70 hover:text-[#ff7a3d] truncate block transition-colors">
      {{ link.url }}
    </a>
  </div>
  <button type="button"
          hx-post="{% url 'link_delete' link.pk %}"
          hx-target="#link-{{ link.pk }}"
          hx-swap="outerHTML"
          class="font-jetbrains text-[10px] text-gray-700 hover:text-red-500 flex-shrink-0 transition-colors mt-0.5">
    ✕
  </button>
</div>
