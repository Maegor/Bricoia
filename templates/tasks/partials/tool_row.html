<div class="tool-row flex items-center gap-2 mb-2">
  <input type="text"
         name="tools-{{ index }}-name"
         class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
         placeholder="Herramienta">
  <button type="button"
          class="text-gray-400 hover:text-red-500 flex-shrink-0 text-lg leading-none"
          hx-on:click="this.closest('.tool-row').remove()">
    &times;
  </button>
</div>
