<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bricoia{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>.font-jetbrains { font-family: 'JetBrains Mono', monospace; }</style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body
  class="bg-[#0a0b0e] text-white min-h-screen {% block body_class %}{% endblock %}"
  hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

  <!-- Header -->
  {% block header %}
  <header class="bg-[#111111] border-b border-[#2a2a2a]">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="{% url 'project_list' %}" class="font-display text-2xl text-orange-500 tracking-widest">BRICOIA</a>

      <nav class="flex items-center gap-6">
        {% if user.is_authenticated %}
          <a href="{% url 'project_list' %}" class="text-gray-400 hover:text-orange-500 text-xs font-medium uppercase tracking-widest transition-colors">Proyectos</a>
          <span class="text-gray-700 text-xs uppercase tracking-wide hidden sm:inline">{{ user.username }}</span>
          <form method="post" action="{% url 'logout' %}" class="inline">
            {% csrf_token %}
            <button type="submit" class="text-gray-600 hover:text-orange-500 text-xs font-medium uppercase tracking-widest transition-colors">Salir</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}" class="text-gray-400 hover:text-orange-500 text-xs font-medium uppercase tracking-widest transition-colors">Iniciar sesión</a>
          <a href="{% url 'register' %}" class="text-orange-500 border border-orange-500/40 hover:border-orange-500 text-xs font-medium uppercase tracking-widest px-3 py-1 rounded transition-colors">Registrarse</a>
        {% endif %}
      </nav>
    </div>
  </header>
  {% endblock %}

  <!-- Flash messages -->
  {% include "partials/messages.html" %}

  <!-- Main content -->
  <main class="max-w-6xl mx-auto px-4 py-6 {% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>

<!-- Lightbox -->
<div id="lightbox"
     class="hidden fixed inset-0 z-50 bg-black/90 flex items-center justify-center cursor-zoom-out"
     onclick="this.classList.add('hidden')">
  <img id="lightbox-img" src="" alt="" class="max-h-screen max-w-screen object-contain p-4">
</div>
<script>
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.remove('hidden');
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') document.getElementById('lightbox').classList.add('hidden');
  });
</script>
</body>
</html>
